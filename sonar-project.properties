# SonarQube configuration.
# Host URL and token configure externally:
#   sonar-scanner -Dsonar.host.url=https://your-sonar -Dsonar.token=YOUR_TOKEN
# or via environment: SONAR_HOST_URL, SONAR_TOKEN

sonar.projectKey=ai-conversation-viz
sonar.projectName=AI Conversation Viz
sonar.projectVersion=1.0.0

# Source layout
sonar.sources=src,build.cjs
sonar.tests=tests
sonar.test.inclusions=tests/**/*.js

# Skip bundle output and embedded sample blobs (generated content)
sonar.exclusions=dist/**,samples/**,node_modules/**,src/core/samples-embedded.js

# Demo-data files — exclude from coverage metrics
sonar.coverage.exclusions=src/core/sample.js,src/core/samples-embedded.js,src/3d/main.js

# JavaScript / TypeScript
sonar.sourceEncoding=UTF-8
sonar.javascript.environments=browser,worker
